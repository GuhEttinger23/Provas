<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Formulário Sem Recarga</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f0f2f5; }
        .form-container { max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 95%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        .btn-enviar { background-color: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .btn-enviar:hover { background-color: #0056b3; }
        
        .list-container { max-width: 500px; background: white; padding: 25px; border-radius: 12px; }
        .card-usuario { background: #f8f9fa; border-left: 5px solid #007bff; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
        .btn-reset { background-color: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Cadastro de Usuário</h2>
        <form id="meuFormulario">
            <div class="input-group">
                <label>Nome de Usuário:</label>
                <input type="text" id="nome" required>
            </div>
            <div class="input-group">
                <label>Senha:</label>
                <input type="password" id="senha" required>
            </div>
            <div class="input-group">
                <label>Telefone:</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999" required>
            </div>
            <div class="input-group">
                <label>Data de Nascimento:</label>
                <input type="date" id="nascimento" required>
            </div>
            <div class="input-group">
                <label>E-mail:</label>
                <input type="email" id="email" required>
            </div>
            <button type="submit" class="btn-enviar">Enviar Dados</button>
        </form>
    </div>

    <div class="list-container">
        <h3>Usuários Cadastrados</h3>
        <div id="listaUsuarios"></div>
        <button id="btnLimpar" class="btn-reset">Limpar Lista</button>
    </div>

    <script src="prova11.js"></script>
</body>
</html>
